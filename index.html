    <div id="root"></div>
    <noscript>
      <h1>Millionle - Daily Number Guessing Game</h1>
      <p>
        Millionle is a free daily number guessing game. Each day, a secret
        number between 1 and 1,000,000 is chosen. You get exactly one guess.
        After guessing, you see how far off you were - scored by distance from
        the answer. A new puzzle launches every day at midnight, and the same
        number is used for all players worldwide.
      </p>

      <h2>How to Play</h2>
      <p>
        Pick any whole number from 1 to 1,000,000 and submit it as your single
        guess for the day. There is no higher/lower feedback - instead, your
        score is based on how close your guess was to the secret number. The
        closer you are, the better your tier. Come back the next day for a brand
        new puzzle.
      </p>

      <h2>Scoring Tiers</h2>
      <ul>
        <li><strong>Dead on</strong> - exact match. One in a million.</li>
        <li><strong>Within 5</strong> - off by 5 or fewer. Breathtaking.</li>
        <li><strong>Within 100</strong> - off by 100 or fewer. Razor close.</li>
        <li>
          <strong>Within 2,500</strong> - off by 2,500 or fewer. Dialed in.
        </li>
        <li>
          <strong>Within 50,000</strong> - off by 50,000 or fewer. Solid read.
        </li>
        <li>
          <strong>Within 250,000</strong> - off by 250,000 or fewer. In the
          zone.
        </li>
        <li>
          <strong>Off the mark</strong> - more than 250,000 away. Not today.
        </li>
      </ul>

      <h2>Features</h2>
      <ul>
        <li>One guess per day - makes every choice count</li>
        <li>Daily leaderboard - see how you rank against other players</li>
        <li>Streak tracking - keep your daily streak alive</li>
        <li>Share your score - copy your result and challenge friends</li>
        <li>Free to play - no account required</li>
      </ul>

      <p>Enable JavaScript to play Millionle.</p>
    </noscript>
