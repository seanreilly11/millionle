<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
<![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;900&display=swap');
]]>
    </style>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#eaeef1"/>

  <!-- White card -->
  <rect x="60" y="60" width="1080" height="510" rx="20" fill="#ffffff"/>

  <!-- Label -->
  <text
    x="600" y="215"
    font-family="'Archivo', system-ui, sans-serif"
    font-weight="400"
    font-size="20"
    fill="#0ea896"
    text-anchor="middle"
    letter-spacing="5"
  >DAILY NUMBER GAME</text>

  <!-- Teal rule -->
  <rect x="520" y="232" width="160" height="2" rx="1" fill="#0ea896" opacity="0.4"/>

  <!-- Title: MILLI[O]NLE -->
  <text
    x="600" y="360"
    font-family="'Archivo', system-ui, sans-serif"
    font-weight="900"
    font-size="152"
    fill="#0e1a22"
    text-anchor="middle"
  >MILLI<tspan fill="#e8920a">O</tspan>NLE</text>

  <!-- Subtitle -->
  <text
    x="600" y="432"
    font-family="'Archivo', system-ui, sans-serif"
    font-weight="400"
    font-size="26"
    fill="#536870"
    text-anchor="middle"
  >Guess the number from 1 to 1,000,000</text>

  <!-- Tagline -->
  <text
    x="600" y="470"
    font-family="'Archivo', system-ui, sans-serif"
    font-weight="400"
    font-size="22"
    fill="#536870"
    text-anchor="middle"
    opacity="0.7"
  >One chance per day.</text>
</svg>
